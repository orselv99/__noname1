syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

import "auth/user.proto";

// Enums
enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  ACCESS_LEVEL_SUMMARY = 1; // Metadata only
  ACCESS_LEVEL_PARTIAL = 2; // Summary + Key Facts
  ACCESS_LEVEL_FULL = 3;    // Full Content
}

enum AccessRequestStatus {
  ACCESS_REQUEST_STATUS_UNSPECIFIED = 0;
  ACCESS_REQUEST_STATUS_PENDING = 1;
  ACCESS_REQUEST_STATUS_APPROVED = 2;
  ACCESS_REQUEST_STATUS_REJECTED = 3;
}

enum DocumentState {
  DOCUMENT_STATE_UNSPECIFIED = 0;
  DOCUMENT_STATE_DRAFT = 1;
  DOCUMENT_STATE_FEEDBACK = 2;
  DOCUMENT_STATE_PUBLISHED = 3;
}

// VisibilityLevel Enum (Moved from document.proto)
enum VisibilityLevel {
  VISIBILITY_LEVEL_UNSPECIFIED = 0;
  VISIBILITY_LEVEL_HIDDEN = 1;      // No external visibility
  VISIBILITY_LEVEL_METADATA = 2;    // Only metadata visible
  VISIBILITY_LEVEL_SNIPPET = 3;     // Summary/Snippet visible
  VISIBILITY_LEVEL_PUBLIC = 4;      // Full content visible
}

// Messages
message Permission {
  string id = 1;
  string document_id = 2;
  string user_id = 3;
  AccessLevel access_level = 4;
  string granted_at = 5;
  string granted_by = 6; // User ID of the granter
}

message AccessRequest {
  string id = 1;
  string requester_id = 2;
  string document_id = 3;
  AccessLevel requested_level = 4;
  AccessRequestStatus status = 5;
  string owner_id = 6;
  string created_at = 7;
  string updated_at = 8;
  
  // Expanded
  User requester = 9;
}

// CheckAccess
message CheckAccessRequest {
  string user_id = 1;
  string document_id = 2;
  string tenant_id = 3;
  // Attributes for Policy Engine
  string user_department_id = 4;
  string document_department_id = 5;
  string document_owner_id = 6;
  DocumentState document_state = 7;
}

message CheckAccessResponse {
  bool allowed = 1;
  AccessLevel max_access_level = 2;
  string reason = 3;
}

// RequestAccess
message RequestAccessRequest {
  string requester_id = 1;
  string document_id = 2;
  AccessLevel requested_level = 3;
  string owner_id = 4; // Used to route the request
}

message RequestAccessResponse {
  string request_id = 1;
  AccessRequestStatus status = 2;
}

// GrantAccess (Approve/Reject)
message GrantAccessRequest {
  string request_id = 1;
  string reviewer_id = 2;
  AccessRequestStatus status = 3; // APPROVED or REJECTED
  AccessLevel granted_level = 4; // Can be different from requested
}

message GrantAccessResponse {
  bool success = 1;
  Permission permission = 2; // Populated if approved
}

// ListAccessRequests
message ListAccessRequestsRequest {
  string user_id = 1; // Requester or Owner
  bool as_reviewer = 2; // If true, list requests where user_id is owner
  string tenant_id = 3;
}

message ListAccessRequestsResponse {
  repeated AccessRequest requests = 1;
}

// Visibility Approval Messages
message VisibilityApproval {
  string id = 1;
  string document_id = 2;
  string requester_id = 3;
  string approver_id = 4;
  int32 requested_level = 5;
  string status = 6; // pending, approved, rejected
  string created_at = 7;
  string updated_at = 8;
}

message ListVisibilityApprovalsRequest {
  string approver_id = 1; // Manager ID
  string department_id = 2; // Filter by Dept
  string tenant_id = 3;
}

message ListVisibilityApprovalsResponse {
  repeated VisibilityApproval approvals = 1;
}

message ApproveVisibilityChangeRequest {
  string approval_id = 1;
  string approver_id = 2;
  string status = 3; // approved, rejected
}

message ApproveVisibilityChangeResponse {
  bool success = 1;
}
