syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

// 사용자 정보
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_SUPER = 1;      // Platform Admin
  ROLE_ADMIN = 2;      // Tenant Admin
  ROLE_VIEWER = 3;     // Department Manager
  ROLE_USER = 4;       // Standard User
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  string tenant_id = 4;
  Role role = 5;
  string department_id = 6;
  string created_at = 7;
  string updated_at = 8;
  string contact = 9;

  string birthday = 12;
  repeated string phone_numbers = 13;
  string position_id = 14; 

  string position_name = 16;
  string department_name = 17;
}

// 사용자 추가 요청
message CreateUserRequest {
  string email = 1;
  string password = 2;
  string username = 3;
  string tenant_id = 4;
  Role role = 5;
  string department_id = 6;

  string birthday = 9;
  repeated string phone_numbers = 10;
  string position_id = 11;


}

// 일괄 사용자 추가 요청 항목
message CreateUserRequestItem {
  string email = 1;
  string username = 2;
  Role role = 3;
  string department_id = 4;

  string birthday = 7;
  repeated string phone_numbers = 8;
  string position_id = 9;

  string password = 11;

}

message CreateUserResponse {
  User user = 1;
}

message BatchCreateUsersRequest {
  string tenant_id = 1;
  repeated CreateUserRequestItem requests = 2;
  string import_mode = 3;
}

message BatchCreateUsersResponse {
  int32 success_count = 1;
  int32 failure_count = 2;
  repeated string failure_reasons = 3;
}

message GetUserRequest {
  string id = 1;
  string tenant_id = 2;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  string tenant_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string query = 4;
  string sort_by = 5;
  bool sort_desc = 6;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
}

// 사용자 수정 요청
message UpdateUserRequest {
  string id = 1;
  string username = 2;
  Role role = 3;
  string tenant_id = 4;
  string department_id = 5;

  string birthday = 8;
  repeated string phone_numbers = 9;
  string position_id = 10;


}

// 사용자 수정 응답
message UpdateUserResponse {
  User user = 1;
}

// 사용자 삭제 요청
message DeleteUserRequest {
  string id = 1;
  string tenant_id = 2;
}

// 사용자 삭제 응답
message DeleteUserResponse {
  bool success = 1;
}
