syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

// 사용자 정보
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_SUPER = 1;      // Platform Admin
  ROLE_ADMIN = 2;      // Tenant Admin
  ROLE_VIEWER = 3;     // Department Manager
  ROLE_USER = 4;       // Standard User
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  string tenant_id = 4;
  Role role = 5;
  string department_id = 6;
  string created_at = 7;
  string updated_at = 8;
  string contact = 9; // Deprecated or mapped to phone_numbers? Let's use new fields.
  string first_name = 10;
  string last_name = 11;
  string birthday = 12;
  repeated string phone_numbers = 13;
  string position = 14;
  string memo = 15;
}

// 사용자 추가 요청
message CreateUserRequest {
  string email = 1;
  string password = 2;
  string username = 3; // Optional/Auto-generated
  string tenant_id = 4;
  Role role = 5;
  string department_id = 6;
  string first_name = 7;
  string last_name = 8;
  string birthday = 9;
  repeated string phone_numbers = 10;
  string position = 11;
  string memo = 12;
}

// 일괄 사용자 추가 요청 항목
message CreateUserRequestItem {
  string email = 1;
  string username = 2;
  Role role = 3;
  string department_id = 4;
  string first_name = 5;
  string last_name = 6;
  string birthday = 7;
  repeated string phone_numbers = 8;
  string position = 9;
  string memo = 10;
}

message CreateUserResponse {
  User user = 1;
}

message BatchCreateUsersRequest {
  string tenant_id = 1;
  repeated CreateUserRequestItem requests = 2;
}

message BatchCreateUsersResponse {
  int32 success_count = 1;
  int32 failure_count = 2;
  repeated string failure_reasons = 3;
}

message GetUserRequest {
  string id = 1;
  string tenant_id = 2;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  string tenant_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string query = 4;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
}

// 사용자 수정 요청
message UpdateUserRequest {
  string id = 1;
  string username = 2;
  Role role = 3;
  string tenant_id = 4;
  string department_id = 5;
  string first_name = 6;
  string last_name = 7;
  string birthday = 8;
  repeated string phone_numbers = 9;
  string position = 10;
  string memo = 11;
}

// 사용자 수정 응답
message UpdateUserResponse {
  User user = 1;
}

// 사용자 삭제 요청
message DeleteUserRequest {
  string id = 1;
  string tenant_id = 2; // 검증용
}

// 사용자 삭제 응답
message DeleteUserResponse {
  bool success = 1;
}
