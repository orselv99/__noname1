services:
  gateway:
    build:
      context: .
      dockerfile: server/Dockerfile.debug
    command: dlv exec /bin/gateway --headless --listen=:40000 --api-version=2 --accept-multiclient --log
    ports:
      - "8080:8080"
      - "40000:40000"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - AUTH_SERVICE_ADDR=auth:50051
      - INDEX_SERVICE_ADDR=index-service:50052
      - SIGNALING_SERVICE_ADDR=signaling:50053
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      index-service:
        condition: service_started
      signaling:
        condition: service_started
    networks:
      - fiery-net
    security_opt:
      - seccomp:unconfined

  auth:
    build:
      context: .
      dockerfile: server/Dockerfile.debug
    command: dlv exec /bin/auth --headless --listen=:40001 --api-version=2 --accept-multiclient --log
    ports:
      - "50051:50051"
      - "40001:40001"
    environment:
      - DB_DSN=host=postgres user=postgres password=postgres dbname=fiery_auth port=5432 sslmode=disable
      - JWT_SECRET=your_secret_key_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiery-net
    security_opt:
      - seccomp:unconfined

  index-service:
    build:
      context: .
      dockerfile: server/Dockerfile.debug
    command: dlv exec /bin/index-service --headless --listen=:40002 --api-version=2 --accept-multiclient --log
    ports:
      - "50052:50052"
      - "40002:40002"
    environment:
      - DB_DSN=host=postgres user=postgres password=postgres dbname=fiery_index port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiery-net
    security_opt:
      - seccomp:unconfined

  signaling:
    build:
      context: .
      dockerfile: server/Dockerfile.debug
    command: dlv exec /bin/signaling --headless --listen=:40003 --api-version=2 --accept-multiclient --log
    ports:
      - "50053:50053"
      - "40003:40003"
    networks:
      - fiery-net
    security_opt:
      - seccomp:unconfined

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/docker/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - fiery-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fiery_auth && pg_isready -U postgres -d fiery_index" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - fiery-net

volumes:
  pgdata:


networks:
  fiery-net:
    driver: bridge
