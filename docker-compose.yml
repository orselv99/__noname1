services:
  gateway:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/gateway
    ports:
      - "8080:8080"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=zzzzzzzz1!
      - AUTH_SERVICE_ADDR=auth:50051
      - INDEX_SERVICE_ADDR=index:50052
      - SIGNALING_SERVICE_ADDR=signaling:50053
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      index:
        condition: service_started
      signaling:
        condition: service_started
    networks:
      - fiery-net

  auth:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/auth
    ports:
      - "50051:50051"
    environment:
      - DB_DSN=host=postgres user=postgres password=zzzzzzzz1! dbname=fiery_auth port=5432 sslmode=disable
      - JWT_SECRET=your_secret_key_dev
      # SMTP Configuration (SSL/TLS on port 465)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SSL=${SMTP_SSL:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiery-net

  index:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/index
    ports:
      - "50052:50052"
    environment:
      - DB_DSN=host=postgres user=postgres password=zzzzzzzz1! dbname=fiery_index port=5432 sslmode=disable
      - LLAMA_COMPLETION_ADDR=http://llama-completion:8080
      #- LLAMA_COMPLETION_ADDR=http://192.168.0.209:81/v1
      - LLAMA_EMBEDDING_ADDR=http://llama-embedding:8080
      #- LLAMA_EMBEDDING_ADDR=http://192.168.0.209:82/v1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiery-net

  signaling:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/signaling
    ports:
      - "50053:50053"
    networks:
      - fiery-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1 # Browser Access
      - API_INTERNAL_URL=http://gateway:8080/api/v1 # SSR Access
    networks:
      - fiery-net

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=zzzzzzzz1!
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/docker/init:/docker-entrypoint-initdb.d
    # SECURITY: Do NOT expose postgres port externally!
    # Use internal docker network only
    ports:
      - "1119:5432"
    networks:
      - fiery-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fiery_auth && pg_isready -U postgres -d fiery_index" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - fiery-net

  llama-completion:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8083:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ./client-ai-service/model:/models
    command: -m /models/gemma-2-2b-it-Q4_K_M.gguf -c 4096 --host 0.0.0.0 --port 8080 -ngl 99
    networks:
      - fiery-net

  llama-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8084:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ./client-ai-service/model:/models
    command: -m /models/nomic-embed-text-v1.5.Q4_K_M.gguf -c 2048 -b 2048 -ub 2048 --host 0.0.0.0 --port 8080 --embedding -ngl 99
    networks:
      - fiery-net

volumes:
  pgdata:


networks:
  fiery-net:
    driver: bridge
