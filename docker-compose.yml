services:
  gateway:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/gateway
    ports:
      - "8080:8080"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - AUTH_SERVICE_ADDR=auth:50051
      - INDEX_SERVICE_ADDR=index-service:50052
      - SIGNALING_SERVICE_ADDR=signaling:50053
    depends_on:
      - postgres
      - auth
      - index-service
      - signaling
    networks:
      - fiery-net

  auth:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/auth
    ports:
      - "50051:50051"
    environment:
      - DB_DSN=host=postgres user=postgres password=postgres dbname=fiery_auth port=5432 sslmode=disable
      - JWT_SECRET=your_secret_key_dev
      # SMTP Configuration (SSL/TLS on port 465)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SSL=${SMTP_SSL:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiery-net

  index-service:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/index-service
    ports:
      - "50052:50052"
    environment:
      - DB_DSN=host=postgres user=postgres password=postgres dbname=fiery_index port=5432 sslmode=disable
      - LLAMA_SERVER_ADDR=http://llama-server:8080
    depends_on:
      postgres:
        condition: service_healthy
      llama-server:
        condition: service_started
    networks:
      - fiery-net

  signaling:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: /app/signaling
    ports:
      - "50053:50053"
    networks:
      - fiery-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1 # Browser Access
      - API_INTERNAL_URL=http://gateway:8080/api/v1 # SSR Access
    networks:
      - fiery-net

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/docker/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - fiery-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fiery_auth && pg_isready -U postgres -d fiery_index" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - fiery-net

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8083:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ./client-ai-service/model:/models
    command: -m /models/google_gemma-3-4b-it-IQ3_M.gguf -c 4096 --host 0.0.0.0 --port 8080 -ngl 99
    networks:
      - fiery-net
  # CPU Only Configuration (For non-GPU environments)
  # llama-server:
  #   image: ghcr.io/ggml-org/llama.cpp:server
  #   ports:
  #     - "8081:8080"
  #   volumes:
  #     - ./client-ai-service/model:/models
  #   command: -m /models/google_gemma-3-4b-it-IQ3_M.gguf -c 4096 --host 0.0.0.0 --port 8080
  #   networks:
  #     - fiery-net

volumes:
  pgdata:


networks:
  fiery-net:
    driver: bridge
