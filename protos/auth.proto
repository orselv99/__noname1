syntax = "proto3";

package auth;

option go_package = "server/protos/auth";

// 인증 서비스 (AuthService) 정의
service AuthService {
  // 사용자 회원가입
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // 사용자 로그인
  rpc Login(LoginRequest) returns (LoginResponse);
  // 토큰 유효성 검증
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  // 토큰 갱신
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

// 회원가입 요청
message RegisterRequest {
  string email = 1;     // 이메일
  string password = 2;  // 비밀번호
  string username = 3;  // 사용자 이름
}

// 회원가입 응답
message RegisterResponse {
  string user_id = 1;   // 생성된 사용자 ID
  string message = 2;   // 결과 메시지
}

// 로그인 요청
message LoginRequest {
  string email = 1;
  string password = 2;
}

// 로그인 응답
message LoginResponse {
  string access_token = 1;  // JWT 액세스 토큰
  string refresh_token = 2; // JWT 리프레시 토큰
  int64 expires_in = 3;     // 만료 시간 (초)
}

// 토큰 검증 요청
message ValidateTokenRequest {
  string access_token = 1;
}

// 토큰 검증 응답
message ValidateTokenResponse {
  bool valid = 1;       // 유효 여부
  string user_id = 2;   // 사용자 ID (유효한 경우)
  string user_salt = 3; // 사용자 Salt (암호화 키 파생용)
}

// 토큰 갱신 요청
message RefreshTokenRequest {
  string refresh_token = 1;
}

// 토큰 갱신 응답
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2; // (선택적) 새 리프레시 토큰
}
