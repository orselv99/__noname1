syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

import "auth/user.proto";
import "auth/tenant.proto";
import "auth/acl.proto";
import "auth/department.proto";
import "auth/project.proto";
import "auth/document.proto";
import "auth/position.proto";

service AuthService {
  //
  // 인증 (Authentication)
  //
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc LookupTenantByEmail(LookupTenantByEmailRequest) returns (LookupTenantByEmailResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  //
  // 사용자 관리 (User Management)
  //
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc BatchCreateUsers(BatchCreateUsersRequest) returns (BatchCreateUsersResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  
  //
  // 테넌트 관리 (Tenant Management)
  //
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  
  //
  // 부서 관리 (Department Management)
  //
  rpc CreateDepartment(CreateDepartmentRequest) returns (CreateDepartmentResponse);
  rpc BatchCreateDepartments(BatchCreateDepartmentsRequest) returns (BatchCreateDepartmentsResponse);
  rpc ListDepartments(ListDepartmentsRequest) returns (ListDepartmentsResponse);
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (UpdateDepartmentResponse);
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (DeleteDepartmentResponse);
  rpc GetDepartment(GetDepartmentRequest) returns (GetDepartmentResponse);
  rpc ReorderDepartments(ReorderDepartmentsRequest) returns (ReorderDepartmentsResponse);

  //
  // 프로젝트 관리 (Project Management)
  //
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc BatchCreateProjects(BatchCreateProjectsRequest) returns (BatchCreateProjectsResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ReorderProjects(ReorderProjectsRequest) returns (ReorderProjectsResponse);

  //
  // Position & Job Management
  //
  rpc CreatePosition(CreatePositionRequest) returns (CreatePositionResponse);
  rpc ListPositions(ListPositionsRequest) returns (ListPositionsResponse);
  rpc UpdatePosition(UpdatePositionRequest) returns (UpdatePositionResponse);
  rpc DeletePosition(DeletePositionRequest) returns (DeletePositionResponse);
  rpc ReorderPositions(ReorderPositionsRequest) returns (ReorderPositionsResponse);
  rpc BatchCreatePositions(BatchCreatePositionsRequest) returns (BatchCreatePositionsResponse);




  //
  // ACL - Access Control
  //
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
  rpc RequestAccess(RequestAccessRequest) returns (RequestAccessResponse);
  rpc GrantAccess(GrantAccessRequest) returns (GrantAccessResponse);
  rpc ListAccessRequests(ListAccessRequestsRequest) returns (ListAccessRequestsResponse);
  
  // 
  // Advanced ACL - Visibility & Metadata
  //
  rpc CreateDocumentMetadata(CreateDocumentMetadataRequest) returns (CreateDocumentMetadataResponse);
  rpc UpdateDocumentVisibility(UpdateDocumentVisibilityRequest) returns (UpdateDocumentVisibilityResponse);
  rpc GetDocumentMetadata(GetDocumentMetadataRequest) returns (GetDocumentMetadataResponse);
  
  //
  // Advanced ACL - Visibility Approval
  //
  rpc ListVisibilityApprovals(ListVisibilityApprovalsRequest) returns (ListVisibilityApprovalsResponse);
  rpc ApproveVisibilityChange(ApproveVisibilityChangeRequest) returns (ApproveVisibilityChangeResponse);
  //
  // Password Management
  //
  rpc ResetAndSendPassword(ResetAndSendPasswordRequest) returns (ResetAndSendPasswordResponse);
  rpc BatchResetPassword(BatchResetPasswordRequest) returns (BatchResetPasswordResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

// 로그인 요청
message LoginRequest {
  string email = 1;
  string password = 2;
  string tenant_id = 3;  // Added for tenant isolation
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

// 로그인 응답
message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string tenant_id = 3;
  int64 expires_in = 4;
  string role = 5;
  bool force_change_password = 6;
  // User info for offline caching
  string user_id = 7;
  string username = 8;
  string position_id = 9;
  string department_id = 10;
  repeated string phone_numbers = 11;
  string contact = 12;
  string created_at = 13;
  string updated_at = 14;
}

message ResetAndSendPasswordRequest {
  string user_id = 1;
  string tenant_id = 2;
}

message ResetAndSendPasswordResponse {
  bool success = 1;
}

// 토큰 검증 요청
message ValidateTokenRequest {
  string access_token = 1;
}

// 토큰 검증 응답
message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string user_salt = 3;
}

// 리프레시 토큰 요청
message RefreshTokenRequest {
  string refresh_token = 1;
}

// 리프레시 토큰 응답
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutResponse {
  bool success = 1;
}

// Tenant lookup by email (for client apps without subdomain)
message LookupTenantByEmailRequest {
  string email = 1;
}

message TenantInfo {
  string tenant_id = 1;
  string name = 2;  // Display name for UI
}

message LookupTenantByEmailResponse {
  repeated TenantInfo tenants = 1;
}