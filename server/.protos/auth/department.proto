syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

import "auth/user.proto";
import "auth/acl.proto";

// Department Message
message Department {
  string id = 1;
  string name = 2;
  // description removed
  string manager_id = 4;
  string parent_department_id = 5; // For hierarchy if needed
  string created_at = 6;
  string updated_at = 7;
  VisibilityLevel default_visibility_level = 10; 
  int32 sort_order = 11; // For drag-drop ordering
  
  // Optional: Manager details for display
  User manager = 8;
  int32 member_count = 9;
}

message CreateDepartmentRequest {
  string name = 1;
  // description removed
  string manager_id = 3;
  string parent_department_id = 4;
  string tenant_id = 5; // Multi-tenancy
  VisibilityLevel default_visibility_level = 6;
  string id = 7; // Optional: Allow defining ID during creation (e.g. Bulk Import)
  string parent_name = 8; // Optional: Lookup parent by name if parent_department_id is empty
}

message CreateDepartmentResponse {
  Department department = 1;
}

message BatchCreateDepartmentsRequest {
  string tenant_id = 1;
  repeated CreateDepartmentRequest requests = 2;
  string import_mode = 3; // "replace" or "upsert"
}

message BatchCreateDepartmentsResponse {
  int32 success_count = 1;
  int32 failure_count = 2;
  repeated string failure_reasons = 3;
}

message ListDepartmentsRequest {
  string tenant_id = 1;
  string search_query = 2; // Optional
}

message ListDepartmentsResponse {
  repeated Department departments = 1;
}

message UpdateDepartmentRequest {
  string id = 1;
  string name = 2;
  // description removed
  string manager_id = 4;
  string parent_department_id = 5;
  VisibilityLevel default_visibility_level = 6;
}

message UpdateDepartmentResponse {
  Department department = 1;
}

message DeleteDepartmentRequest {
  string id = 1;
}

message DeleteDepartmentResponse {
  bool success = 1;
}

// GetDepartment used for details view
message GetDepartmentRequest {
  string id = 1;
}

message GetDepartmentResponse {
  Department department = 1;
}

// Reorder departments (drag-drop)
message DepartmentOrderItem {
  string id = 1;
  string parent_department_id = 2; // Empty for root
  int32 sort_order = 3;
}

message ReorderDepartmentsRequest {
  string tenant_id = 1;
  repeated DepartmentOrderItem items = 2;
}

message ReorderDepartmentsResponse {
  bool success = 1;
}
