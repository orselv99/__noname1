syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

import "auth/acl.proto";

// DocumentMetadata Message (Stored in Auth Service for ACL)
message DocumentMetadata {
  string id = 1;
  string owner_id = 2;
  string department_id = 3;
  string title = 4;
  VisibilityLevel search_visibility_level = 5; 
  bool is_private = 6;
  string approval_status = 7; // none, pending, approved, rejected
  string created_at = 8;
  string updated_at = 9;
}

message CreateDocumentMetadataRequest {
  string id = 1; // Optional, can be auto-generated or passed from Index Service
  string owner_id = 2;
  string department_id = 3;
  string title = 4;
  VisibilityLevel search_visibility_level = 5; // Initial level
  bool is_private = 6;
}

message CreateDocumentMetadataResponse {
  DocumentMetadata document = 1;
}

message UpdateDocumentVisibilityRequest {
  string document_id = 1;
  VisibilityLevel new_visibility_level = 2;
  bool is_private = 3;
  string requester_id = 4; // Used to check permission and dept default
}

message UpdateDocumentVisibilityResponse {
  bool success = 1;
  string status = 2; // "applied", "pending_approval"
  string approval_id = 3; // If pending
}

message GetDocumentMetadataRequest {
  string document_id = 1;
}

message GetDocumentMetadataResponse {
  DocumentMetadata document = 1;
}
