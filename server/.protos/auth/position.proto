syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

message Position {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  int32 order = 4;
}



// Position Requests
message CreatePositionRequest {
  string tenant_id = 1;
  string name = 2;
}

message CreatePositionResponse {
  Position position = 1;
}

message ListPositionsRequest {
  string tenant_id = 1;
}

message ListPositionsResponse {
  repeated Position positions = 1;
}

message UpdatePositionRequest {
  string id = 1;
  string name = 2;
}

message UpdatePositionResponse {
  Position position = 1;
}

message DeletePositionRequest {
  string id = 1;
}

message DeletePositionResponse {
  bool success = 1;
}

message ReorderPositionItem {
  string id = 1;
  int32 order = 2;
}

message ReorderPositionsRequest {
  string tenant_id = 1;
  repeated ReorderPositionItem items = 2;
}

message ReorderPositionsResponse {
  bool success = 1;
}

message BatchCreatePositionsRequest {
  string tenant_id = 1;
  message Request {
    string name = 1;
  }
  repeated Request requests = 2;
  string import_mode = 3; // "upsert" or "replace"
}

message BatchCreatePositionsResponse {
  int32 success_count = 1;
  int32 failure_count = 2;
  repeated string failure_reasons = 3;
}


