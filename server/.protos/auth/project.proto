syntax = "proto3";

package auth;

option go_package = "server/.protos/auth";

import "auth/user.proto";
import "auth/acl.proto";

// Project Message
message Project {
  string id = 1;
  string name = 2;
  string description = 3;
  string manager_id = 4;          // Deprecated: use owner_id
  string owner_id = 12;           // Project owner
  repeated string member_ids = 13; // Project members
  string owner_name = 14;          // Project owner name
  // No hierarchy
  string created_at = 6;
  string updated_at = 7;
  VisibilityLevel default_visibility_level = 10; 
  int32 sort_order = 11; // For drag-drop ordering (flat list)
  
  // Optional: Manager details for display
  User manager = 8;
  int32 member_count = 9;
}

message CreateProjectRequest {
  string name = 1;
  string description = 2;
  string manager_id = 3;          // Deprecated: use owner_id
  string owner_id = 8;            // Project owner
  repeated string member_ids = 9; // Project members
  string tenant_id = 5; // Multi-tenancy
  VisibilityLevel default_visibility_level = 6;
  string id = 7; // Optional
}

message CreateProjectResponse {
  Project project = 1;
}

message BatchCreateProjectsRequest {
  string tenant_id = 1;
  repeated CreateProjectRequest requests = 2;
}

message BatchCreateProjectsResponse {
  int32 success_count = 1;
  int32 failure_count = 2;
  repeated string failure_reasons = 3;
}

message ListProjectsRequest {
  string tenant_id = 1;
  string search_query = 2; // Optional
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message UpdateProjectRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string manager_id = 4;          // Deprecated: use owner_id
  string owner_id = 7;            // Project owner
  repeated string member_ids = 8; // Project members
  VisibilityLevel default_visibility_level = 6;
}

message UpdateProjectResponse {
  Project project = 1;
}

message DeleteProjectRequest {
  string id = 1;
}

message DeleteProjectResponse {
  bool success = 1;
}

// GetProject used for details view
message GetProjectRequest {
  string id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

// Reorder projects (drag-drop)
message ProjectOrderItem {
  string id = 1;
  int32 sort_order = 3;
}

message ReorderProjectsRequest {
  string tenant_id = 1;
  repeated ProjectOrderItem items = 2;
}

message ReorderProjectsResponse {
  bool success = 1;
}
